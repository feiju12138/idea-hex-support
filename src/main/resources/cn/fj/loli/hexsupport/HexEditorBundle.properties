# --- Plugin description (plugin.xml) ---
plugin.name=Hex Support
plugin.description=Open and edit files as hexadecimal data inside IntelliJ IDEA. Provides an editable hex byte table with offset column, raw data preview, hex/ASCII pattern search, offset navigation, multi-selection editing, undo/redo, and fragment import/export.
plugin.changeNotes=Initial 1.0.0 release.
